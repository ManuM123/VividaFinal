name: Vivida CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: vivida-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-key
      NEXT_PUBLIC_ML_API_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system audio dependencies
        run: sudo apt-get update && sudo apt-get install -y libsndfile1 ffmpeg
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run backend tests
        run: pytest tests/backend
      - name: Verify backend app import
        run: python -c "from backend.main import app; print(app.title)"

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f Dockerfile.backend -t vivida-backend:ci .
